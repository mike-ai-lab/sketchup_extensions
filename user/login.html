<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SiteTrack Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    body {
      background: #050505;
      min-height: 100vh;
      overflow-y: auto;
    }
    
    .stroke-text {
      -webkit-text-stroke: 1px rgba(255,255,255,0.3);
      -webkit-text-fill-color: transparent;
      paint-order: stroke fill;
    }
    
    .glass-panel {
      background: #0c0c0e;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .btn-primary {
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
    }
    
    .btn-secondary {
      transition: all 0.3s ease;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(16, 185, 129, 0.5);
    }
    
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    
    .pulse-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }
    
    input:focus {
      outline: none;
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.05);
    }
    
    .status-icon {
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 relative min-h-screen">
  
  <!-- Background Effects -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pulse-glow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pulse-glow" style="animation-delay: 1.5s;"></div>
  </div>
  
  <div class="glass-panel rounded-[40px] shadow-2xl p-8 w-full max-w-lg relative z-10 my-8">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h1 class="text-4xl font-black tracking-tighter leading-none uppercase italic mb-2 stroke-text">
        SiteTrack
      </h1>
      <div class="inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[9px] font-black uppercase tracking-widest rounded">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/>
        </svg>
        Field Tracking Platform
      </div>
    </div>
    
    <!-- Main Content -->
    <div id="loginContent">
      <!-- Google Sign In Button -->
      <button 
        id="googleSignInBtn"
        class="btn-primary w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl py-5 px-6 flex items-center justify-center gap-3 font-black text-xs tracking-widest uppercase mb-6"
      >
        <svg width="20" height="20" viewBox="0 0 20 20">
          <path fill="currentColor" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
          <path fill="currentColor" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
          <path fill="currentColor" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
          <path fill="currentColor" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
        </svg>
        Sign in with Google
      </button>
      
      <!-- Divider -->
      <div class="relative mb-5">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-white/10"></div>
        </div>
        <div class="relative flex justify-center">
          <span class="px-4 bg-[#0c0c0e] text-[9px] font-black uppercase tracking-[0.3em] text-white/30">Or use invite code</span>
        </div>
      </div>
      
      <!-- Invite Code Input -->
      <div class="flex gap-3">
        <input 
          type="text" 
          id="inviteCodeInput"
          placeholder="ENTER CODE..."
          class="flex-1 px-6 py-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 font-medium text-sm uppercase tracking-wider"
        />
        <button 
          id="joinBtn"
          class="btn-secondary bg-white/5 border border-white/10 text-white px-8 py-4 rounded-xl hover:bg-white/10 font-black text-xs tracking-widest uppercase"
        >
          Join
        </button>
      </div>
    </div>
    
    <!-- Status Messages -->
    <div id="statusMessage" class="hidden mt-6 p-5 rounded-2xl max-h-[60vh] overflow-y-auto"></div>
    
    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="hidden text-center mt-6">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
      <p class="text-white/40 mt-4 text-xs font-black uppercase tracking-widest">Authenticating...</p>
    </div>
    
    <!-- Footer -->
    <div class="mt-8 pt-6 border-t border-white/5 text-center">
      <p class="text-[9px] font-black uppercase tracking-[0.4em] text-white/20">© 2025 Studiø / Field Operations</p>
    </div>
  </div>
  
  <!-- Firebase Config -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  
  <script>
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    const joinBtn = document.getElementById('joinBtn');
    const inviteCodeInput = document.getElementById('inviteCodeInput');
    const statusMessage = document.getElementById('statusMessage');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const loginContent = document.getElementById('loginContent');
    
    // Check for invite code in URL first
    const urlParams = new URLSearchParams(window.location.search);
    const inviteCodeFromUrl = urlParams.get('invite');
    
    // Check if already logged in
    checkAuth().then(result => {
      if (result.authenticated) {
        if (result.status === 'active') {
          window.location.href = 'index.html';
        } else if (result.status === 'pending') {
          if (inviteCodeFromUrl) {
            useInviteCode(inviteCodeFromUrl, result.user.uid).then(() => {
              window.location.href = 'index.html';
            }).catch(() => {
              showPendingApproval(result.user);
            });
          } else {
            showPendingApproval(result.user);
          }
        }
      } else {
        if (inviteCodeFromUrl) {
          inviteCodeInput.value = inviteCodeFromUrl;
          setTimeout(() => {
            joinBtn.click();
          }, 500);
        }
      }
    });
    
    // Show pending approval screen with real-time checking
    let waitingTimer = null;
    let waitingStartTime = null;
    let lastReminderTime = 0;
    
    function showPendingApproval(user) {
      loginContent.classList.add('hidden');
      loadingSpinner.classList.add('hidden');
      
      waitingStartTime = Date.now();
      
      showStatus('warning', `
        <div class="text-center">
          <div class="w-16 h-16 mx-auto mb-4 bg-yellow-500/10 rounded-2xl flex items-center justify-center">
            <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="text-xl font-black uppercase italic tracking-tight mb-2 text-white">Pending Approval</div>
          <div class="text-xs text-white/60 mb-4 font-medium">Your account is awaiting administrator approval.</div>
          <div class="bg-white/5 border border-white/10 rounded-xl p-3 mb-4">
            <div class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Account Email</div>
            <div class="text-sm font-bold text-emerald-500">${user.email}</div>
          </div>
          <div class="flex items-center justify-center gap-2 text-xs text-white/40 mb-6 font-medium">
            <div class="animate-spin rounded-full h-4 w-4 border-2 border-yellow-500 border-t-transparent"></div>
            <span class="uppercase tracking-wider">Checking status...</span>
          </div>
          <div class="bg-white/5 border border-white/10 rounded-xl p-4 mb-6">
            <div class="text-[9px] font-black uppercase tracking-[0.3em] text-white/30 mb-2">Waiting Time</div>
            <div class="text-2xl font-black text-yellow-500" id="waiting-timer">0:00</div>
          </div>
          <div class="flex flex-col gap-3">
            <button 
              id="remind-admin-btn"
              onclick="remindAdmin('${user.uid}', '${user.email}')" 
              class="px-8 py-4 bg-yellow-600 hover:bg-yellow-500 text-white rounded-xl transition-all font-black text-xs tracking-widest uppercase disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <svg class="w-3 h-3 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              Remind Admin
            </button>
            <button onclick="signOut()" class="px-6 py-3 bg-white/5 border border-white/10 hover:bg-white/10 text-white rounded-xl transition-all font-black text-xs tracking-widest uppercase">
              Sign Out
            </button>
          </div>
        </div>
      `);
      
      startWaitingTimer();
      listenForApproval(user.uid);
    }
    
    function startWaitingTimer() {
      if (waitingTimer) clearInterval(waitingTimer);
      
      waitingTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - waitingStartTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        const timerElement = document.getElementById('waiting-timer');
        if (timerElement) {
          timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
      }, 1000);
    }
    
    function stopWaitingTimer() {
      if (waitingTimer) {
        clearInterval(waitingTimer);
        waitingTimer = null;
      }
    }
    
    async function remindAdmin(userId, userEmail) {
      const now = Date.now();
      const timeSinceLastReminder = (now - lastReminderTime) / 1000;
      
      if (lastReminderTime > 0 && timeSinceLastReminder < 60) {
        const remainingSeconds = Math.ceil(60 - timeSinceLastReminder);
        showStatus('warning', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-yellow-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white">Please wait ${remainingSeconds}s before sending another reminder.</div>
          </div>
        `);
        setTimeout(() => {
          showPendingApproval({ uid: userId, email: userEmail });
        }, 2000);
        return;
      }
      
      const btn = document.getElementById('remind-admin-btn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `
          <svg class="w-4 h-4 inline-block mr-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Sending...
        `;
      }
      
      try {
        console.log('Disabled - no Firebase operations');
        lastReminderTime = now;
        
        showStatus('success', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white">Reminder sent to admin!</div>
          </div>
        `);
        
        setTimeout(() => {
          showPendingApproval({ uid: userId, email: userEmail });
        }, 2000);
        
      } catch (error) {
        console.error('Error sending reminder:', error);
        showStatus('error', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white">Failed to send reminder. Please try again.</div>
          </div>
        `);
        
        setTimeout(() => {
          showPendingApproval({ uid: userId, email: userEmail });
        }, 2000);
      }
    }
    
    function listenForApproval(userId) {
      console.log('Disabled - no Firebase operations');
      return null;
    }
    
    // Google Sign In
    googleSignInBtn.addEventListener('click', async () => {
      showLoading(true);
      
      const result = await signInWithGoogle();
      
      if (result.success) {
        const authResult = await checkAuth();
        
        if (authResult.status === 'active') {
          window.location.href = 'index.html';
        } else if (authResult.status === 'pending') {
          showLoading(false);
          showPendingApproval(authResult.user);
        }
      } else {
        showLoading(false);
        showStatus('error', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white break-words">Sign in failed: ${result.error}</div>
          </div>
        `);
      }
    });
    
    // Join with Invite Code
    joinBtn.addEventListener('click', async () => {
      const code = inviteCodeInput.value.trim();
      
      console.log('🔑 Join button clicked with code:', code);
      
      if (!code) {
        showStatus('error', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white">Please enter an invite code</div>
          </div>
        `);
        return;
      }
      
      showLoading(true);
      
      try {
        console.log('📋 Checking invite code validity...');
        
        const inviteCheck = await checkInviteCode(code);
        
        console.log('📋 Invite check result:', inviteCheck);
        
        if (!inviteCheck.valid) {
          showLoading(false);
          showStatus('error', `
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </div>
              <div class="text-sm font-black uppercase italic tracking-tight text-white break-words">${inviteCheck.message}</div>
            </div>
          `);
          return;
        }
        
        console.log('✅ Invite code is valid, starting Google sign-in...');
        
        const result = await signInWithGoogle();
        
        console.log('🔐 Sign-in result:', result);
        
        if (result.success) {
          console.log('✅ Sign-in successful, using invite code...');
          
          await useInviteCode(code, result.user.uid);
          
          console.log('✅ Invite code used successfully, redirecting...');
          
          showLoading(false);
          showStatus('success', `
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-4 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
                <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
              <div class="text-xl font-black uppercase italic tracking-tight mb-2 text-white">Welcome!</div>
              <div class="text-xs text-white/60 font-medium">Redirecting to app...</div>
            </div>
          `);
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          console.error('❌ Sign-in failed:', result.error);
          showLoading(false);
          showStatus('error', `
            <div class="text-center">
              <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </div>
              <div class="text-sm font-black uppercase italic tracking-tight text-white break-words">Sign in failed: ${result.error}</div>
            </div>
          `);
        }
      } catch (error) {
        console.error('❌ Join error:', error);
        showLoading(false);
        showStatus('error', `
          <div class="text-center">
            <div class="w-16 h-16 mx-auto mb-4 bg-red-500/10 rounded-2xl flex items-center justify-center">
              <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </div>
            <div class="text-sm font-black uppercase italic tracking-tight text-white break-words">Error: ${error.message}</div>
          </div>
        `);
      }
    });
    
    // Show status message
    function showStatus(type, message) {
      statusMessage.classList.remove('hidden', 'bg-red-500/10', 'bg-yellow-500/10', 'bg-emerald-500/10', 'border-red-500/20', 'border-yellow-500/20', 'border-emerald-500/20');
      
      if (type === 'error') {
        statusMessage.classList.add('bg-red-500/10', 'border', 'border-red-500/20');
      } else if (type === 'warning') {
        statusMessage.classList.add('bg-yellow-500/10', 'border', 'border-yellow-500/20');
      } else if (type === 'success') {
        statusMessage.classList.add('bg-emerald-500/10', 'border', 'border-emerald-500/20');
      }
      
      statusMessage.innerHTML = message;
    }
    
    // Show/hide loading
    function showLoading(show) {
      if (show) {
        loadingSpinner.classList.remove('hidden');
        loginContent.classList.add('hidden');
      } else {
        loadingSpinner.classList.add('hidden');
        loginContent.classList.remove('hidden');
      }
    }
    
    // Return to login (after rejection)
    async function returnToLogin() {
      await signOut();
      window.location.reload();
    }
  </script>
</body>
</html>
